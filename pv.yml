php: '8.5'
document_root: public
env:
  APP_URL: ${project_url}
  VITE_DEV_SERVER_CERT: ${tls_cert}
  VITE_DEV_SERVER_KEY: ${tls_key}
  QUEUE_CONNECTION: failover
mailpit:
  version: latest
  env:
    MAIL_MAILER: failover
    MAIL_HOST: ${smtp_host}
    MAIL_PORT: ${smtp_port}
postgres:
  version: latest
  allocations:
    app:
      env:
        DB_CONNECTION: pgsql
        DB_DATABASE: ${database}
        DB_HOST: ${host}
        DB_PASSWORD: ${password}
        DB_PORT: ${port}
        DB_USERNAME: ${username}
redis:
  version: latest
  allocations:
    cache:
      env:
        REDIS_HOST: ${host}
        REDIS_PORT: ${port}
        REDIS_PREFIX: ${prefix}
rustfs:
  version: latest
  allocations:
    uploads:
      env:
        AWS_ACCESS_KEY_ID: ${access_key}
        AWS_BUCKET: ${bucket}
        AWS_ENDPOINT: ${endpoint}
        AWS_SECRET_ACCESS_KEY: ${secret_key}
